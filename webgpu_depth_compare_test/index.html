<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU textureSampleCompare Depth Test</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eeeeee;
            font-family: sans-serif;
            margin: 20px;
        }
        header { margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin: 0; }
        #status { font-family: monospace; margin-top: 5px; }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button {
            cursor: pointer;
            padding: 10px 20px;
            background-color: #3b82f6;
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 3px;
        }
        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #555; }
        #results {
            background-color: #000;
            border: 1px solid #444;
            padding: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            overflow-x: auto;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
        .table-container { margin-top: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #444; padding: 8px; text-align: center; }
        th { background-color: #333; }
        .match { background-color: #1e3a1e; }
        .mismatch { background-color: #3a1e1e; }
    </style>
</head>
<body>
    <header>
        <h1>WebGPU textureSampleCompare Depth Test</h1>
        <div id="status">Initializing...</div>
    </header>

    <div class="controls">
        <button id="run-btn" onclick="runTest()">Run Depth Comparison Test</button>
    </div>

    <div id="results">
        Click "Run Depth Comparison Test" to see results.
    </div>

    <script type="module">
        let device = null;
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const runBtn = document.getElementById('run-btn');

        async function init() {
            if (!navigator.gpu) {
                statusDiv.innerText = "WebGPU Not Supported";
                statusDiv.style.color = "red";
                runBtn.disabled = true;
                return;
            }
            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                statusDiv.innerText = "No Adapter found";
                statusDiv.style.color = "red";
                runBtn.disabled = true;
                return;
            }
            device = await adapter.requestDevice();
            statusDiv.innerText = "Ready";
            statusDiv.style.color = "#4ade80";
        }

        const shaderCode = `
            @group(0) @binding(0) var t_depth24 : texture_depth_2d;
            @group(0) @binding(1) var t_depth32 : texture_depth_2d;
            @group(0) @binding(2) var s_compare : sampler_comparison;
            
            struct Config {
                format_idx : u32, // 0: depth24unorm, 1: depth32float
                depth_ref  : f32,
            };
            @group(0) @binding(3) var<storage, read> config : Config;
            @group(0) @binding(4) var<storage, read_write> results : array<f32>;

            @compute @workgroup_size(1)
            fn main(@builtin(global_invocation_id) global_id : vec3<u32>) {
                let coords = vec2<u32>(global_id.xy);
                var res : f32 = 0.0;
                
                if (config.format_idx == 0u) {
                    res = textureSampleCompareLevel(t_depth24, s_compare, vec2<f32>(0.5, 0.5), config.depth_ref);
                } else {
                    res = textureSampleCompareLevel(t_depth32, s_compare, vec2<f32>(0.5, 0.5), config.depth_ref);
                }
                
                results[global_id.x] = res;
            }
        `;

        const depthWriteShaderCode = `
            struct Config {
                val : f32,
            };
            @group(0) @binding(0) var<storage, read> config : Config;

            @vertex
            fn vs_main() -> @builtin(position) vec4<f32> {
                return vec4<f32>(0.0, 0.0, 0.0, 1.0);
            }

            @fragment
            fn fs_main() -> @builtin(frag_depth) f32 {
                return config.val;
            }
        `;

        async function runTest() {
            if (!device) return;
            resultsDiv.innerHTML = "Running tests...";
            
            const depthValues = [0.0, 0.25, 0.5, 0.75, 1.0, -0.5, 1.5, 2.0]; // Values to put in depth32float (some outside [0, 1])
            const refValues = [-0.5, 0.0, 0.25, 0.5, 0.75, 1.0, 1.5, 2.0];   // Reference values for comparison

            const formats = [
                { name: 'depth24plus', format: 'depth24plus' }, 
                { name: 'depth32float', format: 'depth32float' }
            ];

            let report = "";

            try {
                // Setup depth writer pipeline
                const depthWriteModule = device.createShaderModule({ code: depthWriteShaderCode });
                
                for (const fmt of formats) {
                    const depthWritePipeline = await device.createRenderPipelineAsync({
                        layout: 'auto',
                        vertex: { module: depthWriteModule, entryPoint: 'vs_main' },
                        fragment: { 
                            module: depthWriteModule, 
                            entryPoint: 'fs_main',
                            targets: [] 
                        },
                        primitive: { topology: 'point-list' },
                        depthStencil: {
                            format: fmt.format,
                            depthWriteEnabled: true,
                            depthCompare: 'always',
                        }
                    });

                    report += `<h3>Testing format: ${fmt.name}</h3>`;
                    report += `<div class='table-container'><table><tr><th>Texture Depth</th>` + refValues.map(v => `<th>Ref: ${v}</th>`).join('') + `</tr>`;

                    for (const texDepth of depthValues) {
                        let row = `<tr><td>${texDepth}</td>`;
                        
                        // Create texture
                        const texture = device.createTexture({
                            size: [1, 1],
                            format: fmt.format,
                            usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING
                        });

                        // Initialize texture with texDepth using the shader
                        const valBuffer = device.createBuffer({
                            size: 4,
                            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
                        });
                        device.queue.writeBuffer(valBuffer, 0, new Float32Array([texDepth]));

                        const bindGroup = device.createBindGroup({
                            layout: depthWritePipeline.getBindGroupLayout(0),
                            entries: [{ binding: 0, resource: { buffer: valBuffer } }]
                        });

                        const encoder = device.createCommandEncoder();
                        const pass = encoder.beginRenderPass({
                            colorAttachments: [],
                            depthStencilAttachment: {
                                view: texture.createView(),
                                depthClearValue: 0.0,
                                depthLoadOp: 'clear',
                                depthStoreOp: 'store',
                            }
                        });
                        pass.setPipeline(depthWritePipeline);
                        pass.setBindGroup(0, bindGroup);
                        pass.draw(1);
                        pass.end();
                        device.queue.submit([encoder.finish()]);
                        
                        valBuffer.destroy();

                        for (const refDepth of refValues) {
                            try {
                                const result = await runCompare(fmt.format, texture, refDepth);
                                row += `<td>${result}</td>`;
                            } catch (e) {
                                console.error(e);
                                row += `<td class="error" title="${e.message}">ERR</td>`;
                            }
                        }
                        row += `</tr>`;
                        report += row;
                        
                        texture.destroy();
                    }
                    report += `</table></div>`;
                }
                resultsDiv.innerHTML = report;
            } catch (globalError) {
                resultsDiv.innerHTML = `<div class="error"><h3>Fatal Test Error</h3><p>${globalError.message}</p><pre>${globalError.stack}</pre></div>`;
            }
        }

        async function runCompare(format, texture, refDepth) {
            device.pushErrorScope('validation');
            
            const shaderModule = device.createShaderModule({ 
                label: `Shader ${format} ${refDepth}`,
                code: shaderCode 
            });

            // Check for early compilation errors
            const compInfo = await shaderModule.getCompilationInfo();
            if (compInfo.messages.some(m => m.type === 'error')) {
                const errors = compInfo.messages.filter(m => m.type === 'error').map(m => m.message).join('\n');
                device.popErrorScope(); // Cleanup scope
                throw new Error(`Shader compilation failed:\n${errors}`);
            }

            const pipeline = await device.createComputePipelineAsync({
                layout: 'auto',
                compute: { module: shaderModule, entryPoint: 'main' }
            });

            const sampler = device.createSampler({
                compare: 'less-equal'
            });

            const configBuffer = device.createBuffer({
                size: 8,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
            });
            device.queue.writeBuffer(configBuffer, 0, new Uint32Array([format === 'depth32float' ? 1 : 0]));
            device.queue.writeBuffer(configBuffer, 4, new Float32Array([refDepth]));

            const resultBuffer = device.createBuffer({
                size: 4,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST
            });
            // Initialize with canary value -1.0 to ensure shader actually runs and writes
            device.queue.writeBuffer(resultBuffer, 0, new Float32Array([-1.0]));

            const dummyFormat = format === 'depth32float' ? 'depth24plus' : 'depth32float';
            const dummyTexture = device.createTexture({
                size: [1, 1],
                format: dummyFormat,
                usage: GPUTextureUsage.TEXTURE_BINDING
            });

            const bindGroup = device.createBindGroup({
                layout: pipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: format === 'depth32float' ? dummyTexture.createView() : texture.createView() },
                    { binding: 1, resource: format === 'depth32float' ? texture.createView() : dummyTexture.createView() },
                    { binding: 2, resource: sampler },
                    { binding: 3, resource: { buffer: configBuffer } },
                    { binding: 4, resource: { buffer: resultBuffer } }
                ]
            });

            const encoder = device.createCommandEncoder();
            const pass = encoder.beginComputePass();
            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.dispatchWorkgroups(1);
            pass.end();

            const readBuffer = device.createBuffer({
                size: 4,
                usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST
            });
            encoder.copyBufferToBuffer(resultBuffer, 0, readBuffer, 0, 4);

            device.queue.submit([encoder.finish()]);

            const validationError = await device.popErrorScope();
            if (validationError) {
                throw new Error(`WebGPU Validation Error: ${validationError.message}`);
            }

            await readBuffer.mapAsync(GPUMapMode.READ);
            const res = new Float32Array(readBuffer.getMappedRange())[0];
            readBuffer.unmap();

            dummyTexture.destroy();
            configBuffer.destroy();
            resultBuffer.destroy();
            readBuffer.destroy();

            return res;
        }

        window.runTest = runTest;
        init();
    </script>
</body>
</html>
