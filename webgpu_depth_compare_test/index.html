<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU textureSampleCompare Depth Test (Fragment)</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eeeeee;
            font-family: sans-serif;
            margin: 20px;
        }
        header { margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin: 0; }
        #status { font-family: monospace; margin-top: 5px; }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-start;
        }
        .control-row {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .checkbox-group, .radio-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .radio-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 10px;
            background: #111;
            border: 1px solid #444;
        }
        button {
            cursor: pointer;
            padding: 10px 20px;
            background-color: #3b82f6;
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 3px;
        }
        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #555; }
        #results {
            background-color: #000;
            border: 1px solid #444;
            padding: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            overflow-x: auto;
        }
        .error { color: #f87171; }
        .table-container { margin-top: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #444; padding: 8px; text-align: center; }
        th { background-color: #333; }
        .clamped-val { font-size: 0.7rem; color: #aaa; display: block; margin-top: 2px; }
        .info { color: #60a5fa; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>WebGPU textureSampleCompare Depth Test (Fragment Shader)</h1>
        <div id="status">Initializing...</div>
    </header>

    <div class="controls">
        <div class="control-row">
            <button id="run-btn" onclick="runTest()">Run Depth Comparison Test</button>
            <div class="checkbox-group">
                <input type="checkbox" id="clamp-0-1">
                <label for="clamp-0-1">Clamp Ref [0.0, 1.0]</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="clamp-safe">
                <label for="clamp-safe">Clamp Ref [1e-6, 1.0 - 1e-6]</label>
            </div>
        </div>
        
        <div class="control-row">
            <span>Sampler Compare:</span>
            <div class="radio-container" id="compare-radios">
                <div class="radio-group"><input type="radio" name="compare" value="never" id="c-never"><label for="c-never">never</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="less" id="c-less"><label for="c-less">less</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="equal" id="c-equal"><label for="c-equal">equal</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="less-equal" id="c-less-equal" checked><label for="c-less-equal">less-equal</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="greater" id="c-greater"><label for="c-greater">greater</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="not-equal" id="c-not-equal"><label for="c-not-equal">not-equal</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="greater-equal" id="c-greater-equal"><label for="c-greater-equal">greater-equal</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="always" id="c-always"><label for="c-always">always</label></div>
            </div>
        </div>
    </div>

    <div id="results">
        Click "Run Depth Comparison Test" to see results.
    </div>

    <script type="module">
        let device = null;
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const runBtn = document.getElementById('run-btn');

        async function init() {
            if (!navigator.gpu) {
                statusDiv.innerText = "WebGPU Not Supported";
                statusDiv.style.color = "red";
                runBtn.disabled = true;
                return;
            }
            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                statusDiv.innerText = "No Adapter found";
                statusDiv.style.color = "red";
                runBtn.disabled = true;
                return;
            }
            device = await adapter.requestDevice();
            statusDiv.innerText = "Ready";
            statusDiv.style.color = "#4ade80";
        }

        const compareShaderCode = `
            @group(0) @binding(0) var t_depth24 : texture_depth_2d;
            @group(0) @binding(1) var t_depth32 : texture_depth_2d;
            @group(0) @binding(2) var s_compare : sampler_comparison;
            
            struct Config {
                format_idx : u32,
                depth_ref  : f32,
            };
            @group(0) @binding(3) var<storage, read> config : Config;

            @vertex
            fn vs_main(@builtin(vertex_index) vertex_idx : u32) -> @builtin(position) vec4<f32> {
                var pos = array<vec2<f32>, 3>(
                    vec2<f32>(-1.0, -1.0),
                    vec2<f32>(3.0, -1.0),
                    vec2<f32>(-1.0, 3.0)
                );
                return vec4<f32>(pos[vertex_idx], 0.0, 1.0);
            }

            @fragment
            fn fs_main() -> @location(0) f32 {
                if (config.format_idx == 0u) {
                    return textureSampleCompare(t_depth24, s_compare, vec2<f32>(0.5, 0.5), config.depth_ref);
                } else {
                    return textureSampleCompare(t_depth32, s_compare, vec2<f32>(0.5, 0.5), config.depth_ref);
                }
            }
        `;

        const depthWriteShaderCode = `
            struct Config {
                val : f32,
            };
            @group(0) @binding(0) var<storage, read> config : Config;

            @vertex
            fn vs_main(@builtin(vertex_index) vertex_idx : u32) -> @builtin(position) vec4<f32> {
                var pos = array<vec2<f32>, 3>(
                    vec2<f32>(-1.0, -1.0),
                    vec2<f32>(3.0, -1.0),
                    vec2<f32>(-1.0, 3.0)
                );
                return vec4<f32>(pos[vertex_idx], 0.0, 1.0);
            }

            @fragment
            fn fs_main() -> @builtin(frag_depth) f32 {
                return config.val;
            }
        `;

        async function runTest() {
            if (!device) return;
            resultsDiv.innerHTML = "Running tests...";
            
            const depthValues = [-1.0, -0.5, 0.0, 0.25, 0.5, 0.75, 1.0, 1.5, 2.0]; 
            const refValues = depthValues;   
            const formats = [
                { name: 'depth24plus', format: 'depth24plus' }, 
                { name: 'depth32float', format: 'depth32float' }
            ];

            const doClamp01 = document.getElementById('clamp-0-1').checked;
            const doClampSafe = document.getElementById('clamp-safe').checked;
            const compareFunc = document.querySelector('input[name="compare"]:checked').value;

            let report = "";
            report += `<p class="info">Sampler Compare: <b>${compareFunc}</b> | Clamping: ${doClamp01 ? '[0, 1] ' : ''}${doClampSafe ? '[1e-6, 1.0-1e-6]' : (doClamp01 || doClampSafe ? '' : 'none')}</p>`;

            try {
                const depthWriteModule = device.createShaderModule({ code: depthWriteShaderCode });
                const compareModule = device.createShaderModule({ code: compareShaderCode });
                
                for (const fmt of formats) {
                    const depthWritePipeline = await device.createRenderPipelineAsync({
                        layout: 'auto',
                        vertex: { module: depthWriteModule, entryPoint: 'vs_main' },
                        fragment: { module: depthWriteModule, entryPoint: 'fs_main', targets: [] },
                        primitive: { topology: 'triangle-list' },
                        depthStencil: {
                            format: fmt.format,
                            depthWriteEnabled: true,
                            depthCompare: 'always',
                        }
                    });

                    const comparePipeline = await device.createRenderPipelineAsync({
                        layout: 'auto',
                        vertex: { module: compareModule, entryPoint: 'vs_main' },
                        fragment: { 
                            module: compareModule, 
                            entryPoint: 'fs_main', 
                            targets: [{ format: 'r32float' }] 
                        },
                        primitive: { topology: 'triangle-list' }
                    });

                    report += `<h3>Testing format: ${fmt.name}</h3>`;
                    report += `<div class='table-container'><table><tr><th>Texture Depth</th>` + refValues.map(v => `<th>Ref: ${v}</th>`).join('') + `</tr>`;

                    for (const texDepth of depthValues) {
                        let row = `<tr><td>${texDepth}</td>`;
                        
                        const texture = device.createTexture({
                            size: [256, 256],
                            format: fmt.format,
                            usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING
                        });

                        const valBuffer = device.createBuffer({
                            size: 4,
                            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
                        });
                        device.queue.writeBuffer(valBuffer, 0, new Float32Array([texDepth]));

                        const initBindGroup = device.createBindGroup({
                            layout: depthWritePipeline.getBindGroupLayout(0),
                            entries: [{ binding: 0, resource: { buffer: valBuffer } }]
                        });

                        const initEncoder = device.createCommandEncoder();
                        const initPass = initEncoder.beginRenderPass({
                            colorAttachments: [],
                            depthStencilAttachment: {
                                view: texture.createView(),
                                depthClearValue: 0.0,
                                depthLoadOp: 'clear',
                                depthStoreOp: 'store',
                            }
                        });
                        initPass.setPipeline(depthWritePipeline);
                        initPass.setBindGroup(0, initBindGroup);
                        initPass.draw(3);
                        initPass.end();
                        device.queue.submit([initEncoder.finish()]);
                        valBuffer.destroy();

                        for (const refDepth of refValues) {
                            try {
                                let finalRef = refDepth;
                                if (doClamp01) finalRef = Math.max(0, Math.min(1, finalRef));
                                if (doClampSafe) {
                                    const eps = 1e-6;
                                    finalRef = Math.max(eps, Math.min(1.0 - eps, finalRef));
                                }

                                const result = await runCompareFragment(fmt.format, texture, finalRef, comparePipeline, compareFunc);
                                
                                let cellContent = `${result}`;
                                if (finalRef !== refDepth) {
                                    cellContent += `<span class="clamped-val">(${finalRef.toFixed(4)})</span>`;
                                }
                                row += `<td>${cellContent}</td>`;
                            } catch (e) {
                                console.error(e);
                                row += `<td class="error" title="${e.message}">ERR</td>`;
                            }
                        }
                        row += `</tr>`;
                        report += row;
                        texture.destroy();
                    }
                    report += `</table></div>`;
                }
                resultsDiv.innerHTML = report;
            } catch (globalError) {
                resultsDiv.innerHTML = `<div class="error"><h3>Fatal Test Error</h3><p>${globalError.message}</p><pre>${globalError.stack}</pre></div>`;
            }
        }

        async function runCompareFragment(format, texture, refDepth, pipeline, compareFunc) {
            device.pushErrorScope('validation');

            const sampler = device.createSampler({ compare: compareFunc });

            const configBuffer = device.createBuffer({
                size: 8,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
            });
            device.queue.writeBuffer(configBuffer, 0, new Uint32Array([format === 'depth32float' ? 1 : 0]));
            device.queue.writeBuffer(configBuffer, 4, new Float32Array([refDepth]));

            // Increased output texture size to 256x256
            const outputTexture = device.createTexture({
                size: [256, 256],
                format: 'r32float',
                usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.COPY_SRC
            });

            const dummyFormat = format === 'depth32float' ? 'depth24plus' : 'depth32float';
            const dummyTexture = device.createTexture({
                size: [256, 256],
                format: dummyFormat,
                usage: GPUTextureUsage.TEXTURE_BINDING
            });

            const bindGroup = device.createBindGroup({
                layout: pipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: format === 'depth32float' ? dummyTexture.createView() : texture.createView() },
                    { binding: 1, resource: format === 'depth32float' ? texture.createView() : dummyTexture.createView() },
                    { binding: 2, resource: sampler },
                    { binding: 3, resource: { buffer: configBuffer } }
                ]
            });

            const encoder = device.createCommandEncoder();
            const pass = encoder.beginRenderPass({
                colorAttachments: [{
                    view: outputTexture.createView(),
                    clearValue: { r: -1.0, g: 0, b: 0, a: 0 },
                    loadOp: 'clear',
                    storeOp: 'store'
                }]
            });
            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.draw(3);
            pass.end();

            const readBuffer = device.createBuffer({
                size: 4,
                usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST
            });

            // Only copy the center pixel (128, 128)
            encoder.copyTextureToBuffer(
                { texture: outputTexture, origin: { x: 128, y: 128, z: 0 } },
                { buffer: readBuffer },
                { width: 1, height: 1 }
            );

            device.queue.submit([encoder.finish()]);

            const validationError = await device.popErrorScope();
            if (validationError) throw new Error(`WebGPU Validation Error: ${validationError.message}`);

            await readBuffer.mapAsync(GPUMapMode.READ);
            const res = new Float32Array(readBuffer.getMappedRange())[0];
            readBuffer.unmap();

            dummyTexture.destroy();
            outputTexture.destroy();
            configBuffer.destroy();
            readBuffer.destroy();

            return res;
        }

        window.runTest = runTest;
        init();
    </script>
</body>
</html>
