<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU textureSampleCompare Visual Test</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eeeeee;
            font-family: sans-serif;
            margin: 20px;
        }
        header { margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin: 0; }
        #status { font-family: monospace; margin-top: 5px; }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-start;
        }
        .control-row {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .radio-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .radio-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 10px;
            background: #111;
            border: 1px solid #444;
        }
        button {
            cursor: pointer;
            padding: 10px 20px;
            background-color: #3b82f6;
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 3px;
        }
        button:hover { background-color: #2563eb; }
        #canvas-container {
            margin-top: 20px;
            background-color: #000;
            border: 1px solid #444;
            display: inline-block;
            padding: 10px;
        }
        canvas {
            image-rendering: pixelated;
            border: 1px solid #333;
        }
        .info { color: #60a5fa; margin-bottom: 10px; }
        .legend { margin-top: 10px; display: flex; gap: 20px; font-size: 0.85rem; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 12px; height: 12px; border: 1px solid #fff; }
    </style>
</head>
<body>
    <header>
        <h1>WebGPU textureSampleCompare Visual Test</h1>
        <div id="status">Initializing...</div>
    </header>

    <div class="controls">
        <div class="control-row">
            <button id="run-btn" onclick="runTest()">Run Visual Test</button>
            
            <span>Format:</span>
            <div class="radio-container">
                <div class="radio-group"><input type="radio" name="format" value="depth24plus" id="f-24" checked><label for="f-24">depth24plus</label></div>
                <div class="radio-group"><input type="radio" name="format" value="depth32float" id="f-32"><label for="f-32">depth32float</label></div>
            </div>

            <span>Mechanism:</span>
            <div class="radio-container">
                <div class="radio-group"><input type="radio" name="mechanism" value="0" id="m-sample" checked><label for="m-sample">textureSampleCompare</label></div>
                <div class="radio-group"><input type="radio" name="mechanism" value="1" id="m-sample-level"><label for="m-sample-level">textureSampleCompareLevel</label></div>
                <div class="radio-group"><input type="radio" name="mechanism" value="2" id="m-gather"><label for="m-gather">textureGatherCompare</label></div>
            </div>
        </div>
        
        <div class="control-row">
            <span>Sampler Compare:</span>
            <div class="radio-container">
                <div class="radio-group"><input type="radio" name="compare" value="never" id="c-never"><label for="c-never">never</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="less" id="c-less"><label for="c-less">less</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="equal" id="c-equal"><label for="c-equal">equal</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="less-equal" id="c-less-equal" checked><label for="c-less-equal">less-equal</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="greater" id="c-greater"><label for="c-greater">greater</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="not-equal" id="c-not-equal"><label for="c-not-equal">not-equal</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="greater-equal" id="c-greater-equal"><label for="c-greater-equal">greater-equal</label></div>
                <div class="radio-group"><input type="radio" name="compare" value="always" id="c-always"><label for="c-always">always</label></div>
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="resultCanvas" width="256" height="256"></canvas>
        <div class="legend">
            <div class="legend-item"><div class="color-box" style="background: red;"></div> Red = Pass (1.0)</div>
            <div class="legend-item"><div class="color-box" style="background: black;"></div> Black = Fail (0.0)</div>
            <div class="legend-item"><div class="color-box" style="background: blue;"></div> Blue = Not Run (Invalid)</div>
            <div class="legend-item">X-axis: Depth (0.0 → 1.0) | Y-axis: Ref (0.0 → 1.0)</div>
        </div>
    </div>

    <div id="results" style="margin-top: 20px;"></div>

    <script type="module">
        let device = null;
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const canvas = document.getElementById('resultCanvas');
        const context = canvas.getContext('webgpu');

        async function init() {
            if (!navigator.gpu) {
                statusDiv.innerText = "WebGPU Not Supported";
                statusDiv.style.color = "red";
                return;
            }
            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                statusDiv.innerText = "No Adapter found";
                statusDiv.style.color = "red";
                return;
            }
            device = await adapter.requestDevice();
            
            context.configure({
                device: device,
                format: navigator.gpu.getPreferredCanvasFormat(),
            });

            statusDiv.innerText = "Ready";
            statusDiv.style.color = "#4ade80";
        }

        const depthInitShaderCode = `
            @vertex
            fn vs_main(@builtin(vertex_index) vertex_idx : u32) -> @builtin(position) vec4<f32> {
                var pos = array<vec2<f32>, 3>(
                    vec2<f32>(-1.0, -1.0),
                    vec2<f32>(3.0, -1.0),
                    vec2<f32>(-1.0, 3.0)
                );
                return vec4<f32>(pos[vertex_idx], 0.0, 1.0);
            }

            @fragment
            fn fs_main(@builtin(position) pos : vec4<f32>) -> @builtin(frag_depth) f32 {
                // Vary depth from 0.0 to 1.0 across X
                return pos.x / 256.0;
            }
        `;

        const visualCompareShaderCode = `
            @group(0) @binding(0) var t_depth : texture_depth_2d;
            @group(0) @binding(1) var s_compare : sampler_comparison;
            
            struct Config {
                mechanism_idx : u32,
            };
            @group(0) @binding(2) var<storage, read> config : Config;

            @vertex
            fn vs_main(@builtin(vertex_index) vertex_idx : u32) -> @builtin(position) vec4<f32> {
                var pos = array<vec2<f32>, 3>(
                    vec2<f32>(-1.0, -1.0),
                    vec2<f32>(3.0, -1.0),
                    vec2<f32>(-1.0, 3.0)
                );
                return vec4<f32>(pos[vertex_idx], 0.0, 1.0);
            }

            @fragment
            fn fs_main(@builtin(position) pos : vec4<f32>) -> @location(0) vec4<f32> {
                let uv = pos.xy / 256.0;
                let depth_ref = uv.y; // Vary reference across Y
                
                var res : f32 = 0.0;
                if (config.mechanism_idx == 0u) {
                    res = textureSampleCompare(t_depth, s_compare, uv, depth_ref);
                } else if (config.mechanism_idx == 1u) {
                    res = textureSampleCompareLevel(t_depth, s_compare, uv, depth_ref);
                } else {
                    let gather_res = textureGatherCompare(t_depth, s_compare, uv, depth_ref);
                    res = (gather_res.x + gather_res.y + gather_res.z + gather_res.w) * 0.25;
                }
                
                // Red = PCF/Compare result (1.0), Black = Fail (0.0)
                // Blue remains from clearValue only if this pixel isn't written
                return vec4<f32>(res, 0.0, 0.0, 1.0);
            }
        `;

        async function checkShaderCompilation(module, label) {
            const info = await module.getCompilationInfo();
            if (info.messages.some(m => m.type === 'error')) {
                const errors = info.messages.filter(m => m.type === 'error').map(m => m.message).join('\n');
                throw new Error(`Shader compilation failed for ${label}:\n${errors}`);
            }
        }

        async function runTest() {
            if (!device) return;
            resultsDiv.innerHTML = "Running visual test...";
            
            const fmt = document.querySelector('input[name="format"]:checked').value;
            const mechanismIdx = parseInt(document.querySelector('input[name="mechanism"]:checked').value);
            const compareFunc = document.querySelector('input[name="compare"]:checked').value;

            try {
                const initModule = device.createShaderModule({ code: depthInitShaderCode });
                await checkShaderCompilation(initModule, "DepthInitModule");
                
                const compareModule = device.createShaderModule({ code: visualCompareShaderCode });
                await checkShaderCompilation(compareModule, "VisualCompareModule");

                // Pipeline for depth initialization
                const initPipeline = await device.createRenderPipelineAsync({
                    layout: 'auto',
                    vertex: { module: initModule, entryPoint: 'vs_main' },
                    fragment: { module: initModule, entryPoint: 'fs_main', targets: [] },
                    primitive: { topology: 'triangle-list' },
                    depthStencil: {
                        format: fmt,
                        depthWriteEnabled: true,
                        depthCompare: 'always',
                    }
                });

                // Pipeline for visual comparison
                const comparePipeline = await device.createRenderPipelineAsync({
                    layout: 'auto',
                    vertex: { module: compareModule, entryPoint: 'vs_main' },
                    fragment: { 
                        module: compareModule, 
                        entryPoint: 'fs_main', 
                        targets: [{ format: navigator.gpu.getPreferredCanvasFormat() }] 
                    },
                    primitive: { topology: 'triangle-list' }
                });

                // Create depth texture
                const depthTexture = device.createTexture({
                    size: [256, 256],
                    format: fmt,
                    usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING
                });

                // Initialize depth texture
                const initEncoder = device.createCommandEncoder();
                const initPass = initEncoder.beginRenderPass({
                    colorAttachments: [],
                    depthStencilAttachment: {
                        view: depthTexture.createView(),
                        depthClearValue: 0.0,
                        depthLoadOp: 'clear',
                        depthStoreOp: 'store',
                    }
                });
                initPass.setPipeline(initPipeline);
                initPass.draw(3);
                initPass.end();
                device.queue.submit([initEncoder.finish()]);

                // Perform visual comparison
                const sampler = device.createSampler({ compare: compareFunc });
                const configBuffer = device.createBuffer({
                    size: 4,
                    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
                });
                device.queue.writeBuffer(configBuffer, 0, new Uint32Array([mechanismIdx]));

                const bindGroup = device.createBindGroup({
                    layout: comparePipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: depthTexture.createView() },
                        { binding: 1, resource: sampler },
                        { binding: 2, resource: { buffer: configBuffer } }
                    ]
                });

                const compEncoder = device.createCommandEncoder();
                const compPass = compEncoder.beginRenderPass({
                    colorAttachments: [{
                        view: context.getCurrentTexture().createView(),
                        clearValue: { r: 0, g: 0, b: 1, a: 1 }, // Clear to Blue
                        loadOp: 'clear',
                        storeOp: 'store'
                    }]
                });
                compPass.setPipeline(comparePipeline);
                compPass.setBindGroup(0, bindGroup);
                compPass.draw(3);
                compPass.end();
                device.queue.submit([compEncoder.finish()]);

                resultsDiv.innerHTML = `<p class="info">Test complete: Format=${fmt}, Mechanism=${mechanismIdx}, Compare=${compareFunc}</p>`;

            } catch (e) {
                resultsDiv.innerHTML = `<div class="error"><h3>Error</h3><p>${e.message}</p></div>`;
                console.error(e);
            }
        }

        window.runTest = runTest;
        init();
    </script>
</body>
</html>
